name: Daily rebuild

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Inject build stamp
        run: |
          mkdir -p .meta
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .meta/build.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          git commit -m "daily rebuild" || exit 0
          git push
